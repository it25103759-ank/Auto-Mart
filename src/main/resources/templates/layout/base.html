<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{title}} | Auto Mart</title>
  <link rel="stylesheet" href="/assets/css/styles.css">
  {{extra_css}}
</head>
<body class="page-loading {{body_class}}">
  <div id="site-loader" class="site-loader">
    <div class="loader-core">
      <div class="loader-ring"></div>
      <div class="loader-car">Auto Mart</div>
      <p id="loader-text">Loading website...</p>
    </div>
  </div>

  {{header_html}}
  {{content_html}}
  {{footer_html}}

  <script src="/assets/js/main.js"></script>
  <script src="/assets/js/automart-shared-profile.js"></script>
  <script src="/assets/js/automart-location-plan-fix.js"></script>
  <script src="/assets/js/automart-profile-remaining-fixes.js"></script>
  {{extra_js}}

<style id="automart-public-system-status-style">
  .automart-maintenance-screen{position:fixed;inset:0;z-index:99999;display:none;align-items:center;justify-content:center;padding:24px;background:radial-gradient(circle at top,rgba(126,200,32,.15),transparent 34%),rgba(3,8,9,.96);backdrop-filter:blur(14px);color:#f5f7ee;text-align:center}
  .automart-maintenance-screen.show{display:flex}
  .automart-maintenance-card{width:min(100%,520px);border:1px solid rgba(126,200,32,.28);border-radius:28px;padding:34px;background:linear-gradient(145deg,rgba(15,25,22,.92),rgba(5,10,12,.92));box-shadow:0 30px 90px rgba(0,0,0,.55),0 0 40px rgba(126,200,32,.12)}
  .automart-maintenance-card img{width:150px;max-width:70%;height:auto;filter:drop-shadow(0 0 18px rgba(126,200,32,.28));margin-bottom:18px}
  .automart-maintenance-card h1{font-size:clamp(26px,5vw,44px);margin:0 0 10px}
  .automart-maintenance-card p{color:#aeb7ac;line-height:1.6;margin:0 0 20px}
  .automart-maintenance-card a{display:inline-flex;text-decoration:none;color:#071000;background:#a0e040;border-radius:999px;padding:12px 20px;font-weight:700}
</style>
<div class="automart-maintenance-screen" id="automartMaintenanceScreen">
  <div class="automart-maintenance-card">
    <img src="/assets/img/full-project-logo.png" alt="AutoMart logo">
    <h1>AutoMart is temporarily offline</h1>
    <p>The public marketplace is temporarily unavailable while the admin team performs updates. Please check again soon.</p>
    <a href="/admin/login">Admin Login</a>
  </div>
</div>
<script id="automart-public-system-status-sync">
(function(){
  const SYSTEM_KEY='automartSystemStatusV1';
  function read(){try{return JSON.parse(localStorage.getItem(SYSTEM_KEY)||'{"mode":"online"}')}catch{return {mode:'online'}}}
  function apply(){
    const status=read();
    const overlay=document.getElementById('automartMaintenanceScreen');
    const path=location.pathname;
    const isAdmin=path.startsWith('/admin') || path.startsWith('/assets') || path.startsWith('/auth') || path.startsWith('/signup');
    if(overlay) overlay.classList.toggle('show', status.mode==='temporary' && !isAdmin);
  }
  window.addEventListener('storage',e=>{if(e.key===SYSTEM_KEY)apply();});
  document.addEventListener('DOMContentLoaded',apply);
  setInterval(apply,2000);
})();
</script>

</body>
</html>
